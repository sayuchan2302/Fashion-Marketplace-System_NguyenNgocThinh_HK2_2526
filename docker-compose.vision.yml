services:
  vision-engine:
    build:
      context: ./vision-engine
    container_name: marketplace-vision-engine
    env_file:
      - ./vision-engine/.env
    ports:
      - "127.0.0.1:8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - vision-engine-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; body=json.load(urllib.request.urlopen('http://127.0.0.1:8001/ready', timeout=5)); raise SystemExit(0 if body.get('ready') is True else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  vision-engine-cache:
